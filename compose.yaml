services:
  # MySQL Database Service
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: todo_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - todo-network

  # Node.js Backend API Service
  backend:
    build: ./backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: todo_db
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - db
    networks:
      - todo-network

  # React Frontend Service (Points to your real 'client' folder)
  client:
    build: ./client
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - todo-network

volumes:
  db_data:

networks:
  todo-network:
    driver: bridge